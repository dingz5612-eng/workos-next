version: 1
id: v5.5-rule-authority
title: V5.5 Engineering Rules OS authority
precedenceOrder:
  - hardRules
  - releaseRules
  - engineeringRules
  - acceptanceRules
  - compatibilityRules
  - deprecatedRules
hardRules:
  - id: hard.no_business_batch_before_won18_green
    source: docs/engineering/00-rule-authority.md
    rule: P0 WON-18 gate evidence must be green before Mobile, Resource, Stay, Money, Deposit, or Checkout business work.
  - id: hard.no_page_specific_business_write_api
    source: docs/engineering/03-api-boundary-rules.md
    rule: Business writes must go through Operations Confirm; page-specific write APIs are P0.
  - id: hard.no_shadow_runtime_official_consumption
    source: docs/engineering/13-release-control-plane-rules.md
    rule: Official projectors must not consume shadow_runtime.
  - id: hard.no_manual_passed_gate_result
    source: docs/engineering/13-release-control-plane-rules.md
    rule: Passed GateResults must be generated by gate-runner and bound to CI evidence.
releaseRules:
  - id: release.v5_4_control_plane_transition
    source: docs/v5.4
    rule: V5.4 documents are control-plane bootstrap and transition rules.
  - id: release.v5_5_final_go_no_go
    source: docs/acceptance/13-v5.5-rules-os-go-no-go.md
    rule: Final V5.5 Go requires green CI, green V5.4 Guards, no P0 invariant failure, and no Red ShadowCompareReport.
engineeringRules:
  - id: engineering.rule_authority
    source: docs/engineering/00-rule-authority.md
    rule: New engineering work follows the Operations Runtime axis.
  - id: engineering.runtime_ownership
    source: docs/engineering/02-runtime-ownership-rules.md
    rule: Each business fact has a unique owner and non-owners must not write it directly.
  - id: engineering.api_boundary
    source: docs/engineering/03-api-boundary-rules.md
    rule: Every non-GET /api route must have exactly one write classification.
  - id: engineering.testing_ci
    source: docs/engineering/14-testing-ci-rules.md
    rule: P0 invariants must declare maturity, target maturity, deadline MR, and blocker policy.
acceptanceRules:
  - id: acceptance.index
    source: docs/acceptance/00-index.md
    rule: Missing machine evidence keeps the batch at NO-GO.
  - id: acceptance.v5_5_rules_os
    source: docs/acceptance/13-v5.5-rules-os-go-no-go.md
    rule: V5.5 Rules OS must generate a final Go/No-Go report before business batches resume.
compatibilityRules:
  - id: compatibility.architecture_docs
    source: docs/architecture
    rule: docs/architecture/* is compatibility reference and cannot override docs/rules/v5.5, docs/engineering, or docs/acceptance.
  - id: compatibility.workspace_card_api
    source: services/core-api/WorkOS.Api
    rule: Workspace/Card prepare and confirm remain compatibility wrappers only.
deprecatedRules:
  - id: deprecated.card_centric_primary_path
    source: legacy Workspace/Card/Confirm model
    rule: Workspace/Card/Confirm is not the primary path for new business behavior.
machineChecks:
  - scripts/check-rule-authority.mjs
  - scripts/check-api-boundaries.mjs
  - scripts/check-fact-ownership.mjs
  - scripts/check-mr-contract.mjs
  - scripts/check-invariant-maturity.mjs
  - scripts/check-gate-result-hardening.mjs
  - scripts/check-rule-drift.mjs
  - scripts/check-v5-5-rules-os.mjs
