{
  "domainId": "dormitory",
  "version": "b1",
  "valueStreams": [
    {
      "id": "resource_availability",
      "name": "resource availability",
      "中文名称": "资源可售可信度",
      "startEvent": "Dorm.ResourceSetupRequested",
      "endState": "BedAvailableForSale",
      "businessObjects": ["Room", "Bed", "RoomReadiness", "ServiceTask"],
      "factOwners": ["accommodation.resource", "accommodation.service"],
      "workItemTypes": ["Dorm.ResourceSetup", "Dorm.RoomReadinessCheck", "Dorm.BedAvailabilityConfirm", "Dorm.ServiceTaskCreate", "Dorm.ServiceTaskComplete"],
      "requiredEvidence": ["room-photo", "cleaning-checklist", "maintenance-clearance"],
      "ledgerImpact": "none",
      "lensOutputs": ["DormAvailabilityLens", "RoomReadinessLens"],
      "risks": ["phantom availability", "blocked bed released early"],
      "SLA": "4h setup, 1h readiness confirmation",
      "ownerRole": "Resource Manager",
      "escalationRole": "Operations Director",
      "certificationScenario": "dorm-cert-004",
      "trainingScenario": "train-resource-readiness",
      "goNoGoCriteria": ["all beds have owner", "blocked beds cannot become available without evidence"]
    },
    {
      "id": "lead_to_stay_conversion",
      "name": "lead-to-stay conversion",
      "中文名称": "线索入住转化",
      "startEvent": "Dorm.LeadCaptured",
      "endState": "StayOpenedWithAssignedBed",
      "businessObjects": ["Lead", "Reservation", "Stay", "BedAssignment"],
      "factOwners": ["accommodation.sales", "accommodation.stay", "accommodation.resource"],
      "workItemTypes": ["Dorm.LeadFollowup", "Dorm.ReservationConfirm", "Dorm.CheckinPrepare", "Dorm.CheckinConfirm", "Dorm.BedAssignmentConfirm"],
      "requiredEvidence": ["identity-document", "reservation-acknowledgement", "checkin-confirmation"],
      "ledgerImpact": "may require deposit liability assessment, no revenue recognition from deposit",
      "lensOutputs": ["LeadFunnelLens", "StayOnboardingLens"],
      "risks": ["reservation without capacity", "checkin without identity evidence"],
      "SLA": "30m lead response, 2h reservation confirmation",
      "ownerRole": "Front Desk Lead",
      "escalationRole": "Dormitory Operations Owner",
      "certificationScenario": "dorm-cert-001",
      "trainingScenario": "train-lead-to-stay",
      "goNoGoCriteria": ["reservation links to bed capacity", "checkin requires identity evidence"]
    },
    {
      "id": "in_stay_revenue",
      "name": "in-stay revenue",
      "中文名称": "在住收入",
      "startEvent": "Dorm.StayOpened",
      "endState": "StayBalanceProjected",
      "businessObjects": ["Charge", "Payment", "PaymentAllocation", "StayBalance"],
      "factOwners": ["finance.charge-ledger", "finance.payment-ledger"],
      "workItemTypes": ["Dorm.ChargeGenerate", "Dorm.PaymentRegister", "Dorm.PaymentConfirm"],
      "requiredEvidence": ["charge-basis", "payment-receipt", "cashier-review"],
      "ledgerImpact": "ordinary payment allocation only, never mixes deposit movement",
      "lensOutputs": ["StayBalanceLens", "RevenueCollectionLens"],
      "risks": ["frontend balance used as fact", "payment without allocation"],
      "SLA": "same shift charge generation, 15m payment confirmation",
      "ownerRole": "Finance Cashier",
      "escalationRole": "Finance Supervisor",
      "certificationScenario": "dorm-cert-003",
      "trainingScenario": "train-payment-allocation",
      "goNoGoCriteria": ["payment produces balanced LedgerTransaction", "frontend total is not fact source"]
    },
    {
      "id": "deposit_liability",
      "name": "deposit liability",
      "中文名称": "押金负债",
      "startEvent": "Dorm.DepositAssessed",
      "endState": "DepositLiabilityProjected",
      "businessObjects": ["DepositAccount", "DepositReceipt", "Refund", "Deduction"],
      "factOwners": ["finance.deposit-ledger"],
      "workItemTypes": ["Dorm.DepositAssess", "Dorm.DepositReceive", "Dorm.DepositConfirm", "Dorm.DepositDeduct", "Dorm.RefundApprove"],
      "requiredEvidence": ["deposit-policy", "receipt-proof", "deduction-evidence", "refund-approval"],
      "ledgerImpact": "deposit is liability, refund is reversal/refund transaction",
      "lensOutputs": ["DepositLiabilityLens", "RefundRiskLens"],
      "risks": ["deposit treated as revenue", "refund without liability balance"],
      "SLA": "15m receipt confirmation, 1d refund approval",
      "ownerRole": "Finance Supervisor",
      "escalationRole": "Finance Controller",
      "certificationScenario": "dorm-cert-002",
      "trainingScenario": "train-deposit-liability",
      "goNoGoCriteria": ["deposit never posts to revenue", "refund cannot exceed refundable balance"]
    },
    {
      "id": "checkout_turnover",
      "name": "checkout turnover",
      "中文名称": "退住周转",
      "startEvent": "Dorm.CheckoutRequested",
      "endState": "BedReleasedAvailable",
      "businessObjects": ["Checkout", "Inspection", "Settlement", "Cleaning", "ResourceRelease"],
      "factOwners": ["accommodation.checkout", "finance.deposit-ledger", "accommodation.resource"],
      "workItemTypes": ["Dorm.RoomInspection", "Dorm.CheckoutSettlement", "Dorm.DepositDeduct", "Dorm.RefundApprove", "Dorm.ResourceRelease"],
      "requiredEvidence": ["room-inspection", "deduction-basis", "cleaning-checklist", "settlement-review"],
      "ledgerImpact": "settlement reads ledger projection and records balanced deduction/refund transactions",
      "lensOutputs": ["CheckoutTurnoverLens", "DepositSettlementLens"],
      "risks": ["release before inspection", "settlement fabricates money fact"],
      "SLA": "2h inspection, 4h settlement, 4h clean-to-available",
      "ownerRole": "Checkout Coordinator",
      "escalationRole": "Operations Director",
      "certificationScenario": "dorm-cert-005",
      "trainingScenario": "train-checkout-turnover",
      "goNoGoCriteria": ["inspection evidence exists", "settlement does not update/delete ledger entry"]
    }
  ],
  "productionAllowed": false
}
