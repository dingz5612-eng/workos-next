name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: workosnext_test
          POSTGRES_USER: workosnext
          POSTGRES_PASSWORD: workosnext_dev
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U workosnext -d workosnext_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm --prefix apps/mobile ci

      - name: Audit mobile dependencies
        run: npm --prefix apps/mobile audit --audit-level=low

      - name: Build mobile
        run: npm --prefix apps/mobile run build

      - name: Validate no production fake fallback
        run: |
          node scripts/check-no-production-fake-fallback.mjs --self-test
          node scripts/check-no-production-fake-fallback.mjs --dist

      - name: Test mobile
        run: npm --prefix apps/mobile run test

      - name: Build backend
        run: dotnet build WorkOSNext.sln -c Release

      - name: Run unit tests
        run: dotnet test tests/WorkOS.UnitTests/WorkOS.UnitTests.csproj -c Release --no-build

      - name: Run runtime integration tests
        run: dotnet test tests/WorkOS.RuntimeIntegrationTests/WorkOS.RuntimeIntegrationTests.csproj -c Release --no-build

      - name: Run runtime contract tests
        env:
          WORKOS_TEST_CONNECTION: Host=localhost;Port=54329;Database=workosnext_test;Username=workosnext;Password=workosnext_dev
          TEST_DATABASE: "true"
        run: dotnet run --project tests/WorkOS.RuntimeContractTests/WorkOS.RuntimeContractTests.csproj -c Release

      - name: Validate contract files
        run: node scripts/validate-contracts.mjs

      - name: Validate slice admission
        run: node scripts/validate-slice-admission.mjs

      - name: Architecture drift report
        run: node scripts/architecture-drift-report.mjs

      - name: Validate generated DTOs
        run: node scripts/generate-contract-dtos.mjs --check

      - name: Validate runtime API semantics
        env:
          ConnectionStrings__WorkOSRuntime: Host=localhost;Port=54329;Database=workosnext_test;Username=workosnext;Password=workosnext_dev
        run: node scripts/validate-runtime-api.mjs

      - name: Validate API boundaries
        run: |
          node scripts/check-api-boundaries.mjs --self-test
          node scripts/check-api-boundaries.mjs

      - name: Architecture guard
        shell: pwsh
        env:
          ConnectionStrings__WorkOSRuntime: Host=localhost;Port=54329;Database=workosnext_test;Username=workosnext;Password=workosnext_dev
          WORKOS_TEST_CONNECTION: Host=localhost;Port=54329;Database=workosnext_test;Username=workosnext;Password=workosnext_dev
          TEST_DATABASE: "true"
        run: ./scripts/guard-architecture.ps1

      - name: Clean baseline gate
        shell: pwsh
        run: ./scripts/clean-baseline.ps1

      - name: Diff whitespace check
        run: git diff --check
