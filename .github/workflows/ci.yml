name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: workosnext
          POSTGRES_USER: workosnext
          POSTGRES_PASSWORD: workosnext_dev
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U workosnext -d workosnext"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Audit mobile dependencies
        working-directory: apps/mobile
        run: npm audit --audit-level=low

      - name: Build mobile
        working-directory: apps/mobile
        run: npm run build

      - name: Build backend
        run: dotnet build WorkOSNext.sln -c Release

      - name: Run runtime contract tests
        env:
          WORKOS_TEST_CONNECTION: Host=localhost;Port=54329;Database=workosnext;Username=workosnext;Password=workosnext_dev
        run: dotnet run --project tests/WorkOS.RuntimeContractTests/WorkOS.RuntimeContractTests.csproj -c Release

      - name: Validate contract files
        run: node scripts/validate-contracts.mjs

      - name: Validate generated DTOs
        run: node scripts/generate-contract-dtos.mjs --check

      - name: Architecture guard
        shell: pwsh
        run: ./scripts/guard-architecture.ps1

      - name: Clean baseline gate
        shell: pwsh
        run: ./scripts/clean-baseline.ps1

      - name: Diff whitespace check
        run: git diff --check
